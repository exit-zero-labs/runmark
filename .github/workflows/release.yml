name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write   # required for npm OIDC trusted publishing

jobs:
  release:
    # Skip the bot's own version-bump push so we don't loop.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.27.0

      - name: Set up Node.js (npm registry)
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Version bump MUST run before build so the tarball bakes in the bumped
      # version. Previously validate ran first and baked the pre-bump version
      # into apps/cli/publish, which then shipped the stale version to npm.
      - name: Apply pending changesets (version bump + commit + push)
        id: version
        run: |
          set -euo pipefail
          # Count user changeset files (exclude README + config).
          changeset_count=$(find .changeset -maxdepth 1 -name "*.md" \
            ! -name "README.md" | wc -l | tr -d ' ')
          if [ "$changeset_count" -eq 0 ]; then
            echo "No pending changesets — nothing to version."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Found $changeset_count pending changeset(s); running changeset version."
          pnpm changeset version
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "changeset version produced no diff — nothing to commit."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(release): version packages"
          git push origin HEAD:main
          echo "bumped=true" >> "$GITHUB_OUTPUT"

      - name: Validate (lint, typecheck, build, tests)
        run: |
          pnpm check
          pnpm test

      - name: Publish unpublished package versions to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e
          OUTPUT=$(pnpm publish:packages 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          # `publish-packages.mjs` aborts when the current version is already
          # published. For a normal push that contained no version bump and
          # no new changesets this is the expected no-op exit; treat it as
          # success so the workflow stays green.
          if [ $STATUS -ne 0 ] && echo "$OUTPUT" | grep -q "already exists on npm"; then
            echo "::notice::Nothing to release — current versions already on npm."
            exit 0
          fi
          exit $STATUS
