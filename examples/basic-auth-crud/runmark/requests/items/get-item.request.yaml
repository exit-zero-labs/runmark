# yaml-language-server: $schema=https://raw.githubusercontent.com/exit-zero-labs/runmark/main/packages/contracts/schemas/request.schema.json
kind: request
title: Get item
method: GET
url: "{{baseUrl}}/basic/items/{{itemId}}"
auth:
  scheme: basic
  username: admin
  password: "{{secrets.adminPassword}}"
expect:
  status: 200
extract:
  itemStatus:
    from: $.status
    required: true
