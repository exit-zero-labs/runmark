# yaml-language-server: $schema=https://raw.githubusercontent.com/exit-zero-labs/runmark/main/packages/contracts/schemas/request.schema.json
kind: request
title: Get pending alerts
method: GET
url: "{{baseUrl}}/ops/services/{{serviceId}}/alerts"
auth:
  scheme: header
  header: x-ops-key
  value: $ENV:OPS_API_KEY
expect:
  status: 200
extract:
  alertCount:
    from: $.count
    required: true
