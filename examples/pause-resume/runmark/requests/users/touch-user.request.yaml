# yaml-language-server: $schema=https://raw.githubusercontent.com/exit-zero-labs/runmark/main/packages/contracts/schemas/request.schema.json
kind: request
title: Touch user
method: POST
url: "{{baseUrl}}/users/{{userId}}/touch"
uses:
  headers:
    - common/json
  auth: common/bearer
body:
  json:
    note: "visited by {{steps.get-user.userName}}"
  contentType: application/json
expect:
  status: 200
