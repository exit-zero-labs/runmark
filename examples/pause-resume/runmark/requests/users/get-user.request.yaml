# yaml-language-server: $schema=https://raw.githubusercontent.com/exit-zero-labs/runmark/main/packages/contracts/schemas/request.schema.json
kind: request
title: Get user
method: GET
url: "{{baseUrl}}/users/{{userId}}"
uses:
  headers:
    - common/json
  auth: common/bearer
expect:
  status: 200
extract:
  userName:
    from: $.name
    required: true
