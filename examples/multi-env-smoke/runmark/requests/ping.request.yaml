# yaml-language-server: $schema=https://raw.githubusercontent.com/exit-zero-labs/runmark/main/packages/contracts/schemas/request.schema.json
kind: request
title: Ping environment
method: GET
url: "{{baseUrl}}/env/ping?env={{environmentName}}"
expect:
  status: 200
extract:
  activeEnvironment:
    from: $.environment
    required: true
