# yaml-language-server: $schema=https://raw.githubusercontent.com/exit-zero-labs/runmark/main/packages/contracts/schemas/run.schema.json
kind: run
title: Recover report
env: dev
steps:
  - kind: request
    id: fetch-report
    uses: recovery/fetch-report

  - kind: request
    id: confirm-report
    uses: recovery/confirm-report
    with:
      reportId: "{{steps.fetch-report.reportId}}"
